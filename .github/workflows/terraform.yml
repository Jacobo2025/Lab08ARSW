name: Terraform CI/CD

on:
  pull_request:
    paths:
      - "infra/**"
      - "modules/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Ejecutar terraform apply"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  TF_WORKING_DIR: infra
  TF_IN_AUTOMATION: true

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build backend.hcl for CI
        run: |
          cat > "$TF_WORKING_DIR/backend.hcl" <<EOF
          resource_group_name  = "${{ vars.TFSTATE_RESOURCE_GROUP }}"
          storage_account_name = "${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          container_name       = "${{ vars.TFSTATE_CONTAINER }}"
          key                  = "${{ vars.TFSTATE_KEY }}"
          EOF

      - name: Prepare SSH public key file for CI
        run: |
          test -n "${{ secrets.TF_SSH_PUBLIC_KEY }}"
          printf "%s" "${{ secrets.TF_SSH_PUBLIC_KEY }}" > "$RUNNER_TEMP/id_ed25519.pub"

      - name: Terraform Fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file=env/dev.tfvars \
            -var "ssh_public_key=$RUNNER_TEMP/id_ed25519.pub" \
            -out plan.tfplan
          terraform show -no-color plan.tfplan > plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            infra/plan.tfplan
            infra/plan.txt

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'workflow_dispatch' && inputs.apply == true
    environment: dev
    concurrency:
      group: terraform-dev-apply
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build backend.hcl for CI
        run: |
          cat > "$TF_WORKING_DIR/backend.hcl" <<EOF
          resource_group_name  = "${{ vars.TFSTATE_RESOURCE_GROUP }}"
          storage_account_name = "${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          container_name       = "${{ vars.TFSTATE_CONTAINER }}"
          key                  = "${{ vars.TFSTATE_KEY }}"
          EOF

      - name: Prepare SSH public key file for CI
        run: |
          test -n "${{ secrets.TF_SSH_PUBLIC_KEY }}"
          printf "%s" "${{ secrets.TF_SSH_PUBLIC_KEY }}" > "$RUNNER_TEMP/id_ed25519.pub"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan (apply safety)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file=env/dev.tfvars \
            -var "ssh_public_key=$RUNNER_TEMP/id_ed25519.pub" \
            -out plan.tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve plan.tfplan

